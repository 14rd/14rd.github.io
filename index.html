<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vector Studio — Prototypes</title>
<meta name="description" content="Vector Studio client prototype access.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://prototypes.vectorstudio.global/">
<meta property="og:title" content="Vector Studio — Prototypes">
<meta property="og:description" content="Client prototype access portal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --text-soft: #666666;
    --text-mute: #999999;
    --border: #e0e0e0;
    --border-focus: #111111;
    --sans: "Inter", -apple-system, system-ui, sans-serif;
    --serif: "DM Serif Display", Georgia, serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .portal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
  }

  .portal-mark {
    width: 28px;
    height: 28px;
    position: relative;
  }

  .portal-mark svg {
    width: 28px;
    height: 28px;
  }

  .portal-header-right {
    font-size: 13px;
    color: var(--text-soft);
    letter-spacing: -0.01em;
  }

  .portal-header-right a {
    color: var(--text);
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .portal-header-right a:hover {
    opacity: 0.5;
  }

  .portal-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .portal-box {
    width: 100%;
    max-width: 400px;
  }

  .portal-box h1 {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .portal-desc {
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.55;
    margin-bottom: 48px;
    letter-spacing: -0.01em;
  }

  .field-group {
    margin-bottom: 20px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text-mute);
    margin-bottom: 8px;
    display: block;
  }

  .field {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    letter-spacing: -0.01em;
    outline: none;
    transition: border-color 0.2s;
  }

  .field::placeholder { color: #c0c0c0; }
  .field:focus { border-color: var(--border-focus); }

  .submit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 32px;
  }

  .submit-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: none;
    color: var(--text);
    font-family: var(--sans);
    font-weight: 400;
    font-size: 16px;
    letter-spacing: -0.01em;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.15s;
  }

  .submit-btn:hover { opacity: 0.5; }

  .submit-btn svg {
    transition: transform 0.2s;
  }

  .submit-btn:hover svg {
    transform: translate(2px, -2px);
  }

  .error-msg {
    font-size: 13px;
    color: #d44;
    margin-top: 20px;
    min-height: 18px;
    letter-spacing: -0.01em;
  }

  .portal-footer {
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
  }

  .portal-footer span {
    font-size: 12px;
    color: var(--text-mute);
    letter-spacing: -0.005em;
  }

  .portal-footer a {
    font-size: 12px;
    color: var(--text-mute);
    text-decoration: none;
    transition: color 0.15s;
  }

  .portal-footer a:hover { color: var(--text); }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 48px;
  }

  @media (max-width: 600px) {
    .portal-box h1 { font-size: 32px; }
    .portal-header { padding: 16px 20px; }
    .portal-footer { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header class="portal-header">
  <div class="portal-mark">
    <svg viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="4" r="1.5" fill="#111"/>
      <circle cx="14" cy="24" r="1.5" fill="#111"/>
      <circle cx="4" cy="14" r="1.5" fill="#111"/>
      <circle cx="24" cy="14" r="1.5" fill="#111"/>
      <circle cx="14" cy="14" r="3" stroke="#111" stroke-width="1.2" fill="none"/>
      <line x1="14" y1="7" x2="14" y2="11" stroke="#111" stroke-width="1"/>
      <line x1="14" y1="17" x2="14" y2="21" stroke="#111" stroke-width="1"/>
      <line x1="7" y1="14" x2="11" y2="14" stroke="#111" stroke-width="1"/>
      <line x1="17" y1="14" x2="21" y2="14" stroke="#111" stroke-width="1"/>
    </svg>
  </div>
  <div class="portal-header-right">
    <a href="https://vectorstudio.global">vectorstudio.global</a>
  </div>
</header>

<main class="portal-main">
  <div class="portal-box">
    <h1>Prototype access</h1>
    <p class="portal-desc">Enter the credentials provided by your team to view the project.</p>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="field-group">
        <label class="field-label" for="loginUser">Username</label>
        <input class="field" type="text" id="loginUser" placeholder="Enter username" autocomplete="off" autofocus />
      </div>
      <div class="field-group">
        <label class="field-label" for="loginPass">Password</label>
        <input class="field" type="password" id="loginPass" placeholder="Enter password" autocomplete="off" />
      </div>
      <div class="submit-row">
        <button type="submit" class="submit-btn">
          Continue
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 13L13 3M13 3H6M13 3v7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </form>
    <div class="error-msg" id="loginError"></div>
  </div>
</main>

<footer class="portal-footer">
  <span>&copy; 2025 Vector Studio</span>
  <a href="https://vectorstudio.global">Studio</a>
</footer>

<script>
var CLIENTS = [
  {
    username: 'vectorprototype',
    password: 'spaciomnpclabs',
    path: '/spaciom/',
    sessionKey: 'vs_proto_spaciom'
  }
  // {
  //   username: 'clientname',
  //   password: 'securepassword',
  //   path: '/clientfolder/',
  //   sessionKey: 'vs_proto_clientname'
  // }
];

function handleLogin(e) {
  e.preventDefault();
  var u = document.getElementById('loginUser').value.trim().toLowerCase();
  var p = document.getElementById('loginPass').value;
  var errorEl = document.getElementById('loginError');

  for (var i = 0; i < CLIENTS.length; i++) {
    if (u === CLIENTS[i].username && p === CLIENTS[i].password) {
      sessionStorage.setItem(CLIENTS[i].sessionKey, '1');
      window.location.href = CLIENTS[i].path;
      return false;
    }
  }

  errorEl.textContent = 'Invalid credentials';
  document.getElementById('loginPass').value = '';
  return false;
}
</script>

</body>
</html>
