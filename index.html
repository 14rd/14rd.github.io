<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spaciom — The Spatial Fandom Experience</title>
<meta name="description" content="The infrastructure layer for fan engagement. Phone. Desktop. Headset.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Login Gate -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-mark"></div>
    <h1>SPACIOM</h1>
    <div class="login-sub">Vector Prototype Access</div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <input class="login-field" type="text" id="loginUser" placeholder="Username" autocomplete="off" autofocus />
      <input class="login-field" type="password" id="loginPass" placeholder="Password" autocomplete="off" />
      <button type="submit" class="btn-gold login-submit">Enter <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:inline-block;vertical-align:middle"><path d="M2 7H12M12 7L7.5 2.5M12 7L7.5 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  if (u === 'vectorprototype' && p === 'spaciomnpclabs') {
    document.getElementById('loginOverlay').classList.add('hidden');
    sessionStorage.setItem('spaciom_auth', '1');
  } else {
    document.getElementById('loginError').textContent = 'Invalid credentials';
    document.getElementById('loginPass').value = '';
  }
  return false;
}
if (sessionStorage.getItem('spaciom_auth') === '1') {
  document.getElementById('loginOverlay').classList.add('hidden');
}
</script>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="phones.jsx"></script>
<script type="text/babel" src="console.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
