<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spaciom — Get in Touch</title>
<meta name="description" content="Contact Spaciom. Build the spatial fandom experience with us.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
/* Page transition overlay */
.page-transition {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
}
.page-transition.active {
  opacity: 1;
  pointer-events: all;
}

.contact-main {
  max-width: 680px;
  margin: 0 auto;
  padding: 120px 36px 80px;
  position: relative;
  z-index: 1;
}
.contact-eyebrow {
  font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 28px;
}
.contact-title {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(40px, 6vw, 72px);
  line-height: 0.95; letter-spacing: -0.04em;
  margin-bottom: 24px;
}
.contact-title .italic {
  font-family: var(--serif); font-style: italic;
  color: var(--gold); font-weight: 400; letter-spacing: -0.01em;
}
.contact-desc {
  font-size: 17px; color: var(--ink-soft); line-height: 1.55;
  max-width: 520px; margin-bottom: 56px; letter-spacing: -0.005em;
}
.form-group { margin-bottom: 28px; }
.form-label {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: 10px;
}
.form-input, .form-textarea {
  width: 100%;
  background: rgba(243,238,226,0.03);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  letter-spacing: -0.01em;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.form-input::placeholder, .form-textarea::placeholder { color: rgba(243,238,226,0.25); }
.form-input:focus, .form-textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(232,200,122,0.08);
}
.form-textarea { min-height: 140px; resize: vertical; line-height: 1.5; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-select {
  width: 100%;
  background: rgba(243,238,226,0.03);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  outline: none;
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='rgba(243,238,226,0.4)' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 16px center;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.form-select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(232,200,122,0.08); }
.form-select option { background: #0a1830; color: var(--ink); }
.form-submit {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--gold); color: #1a1408;
  font-family: var(--sans); font-weight: 500; font-size: 15px;
  padding: 14px 28px; border-radius: 999px; border: none; cursor: pointer;
  transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
  box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 0 0 1px rgba(232,200,122,0.4);
}
.form-submit:hover {
  background: var(--gold-2); transform: translateY(-1px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 8px 24px rgba(232,200,122,0.18), 0 0 0 1px rgba(232,200,122,0.55);
}
.form-success {
  display: none; padding: 20px 24px; border-radius: 10px;
  background: rgba(163,212,163,0.08); border: 1px solid rgba(163,212,163,0.2);
  color: #a3d4a3; font-size: 15px; line-height: 1.5; margin-top: 28px;
}
.form-success.visible { display: block; }
@media (max-width: 600px) {
  .contact-main { padding: 80px 24px 60px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
<script>
if (sessionStorage.getItem('vs_proto_spaciom') !== '1') {
  window.location.replace('/');
}
</script>
</head>
<body>
<div class="page-transition" id="pageTransition"></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
<script type="text/babel">

function CustomCursor() {
  const glowRef = React.useRef(null);
  const dotRef = React.useRef(null);
  const mouse = React.useRef({ x: -100, y: -100 });
  const glowPos = React.useRef({ x: -100, y: -100 });

  React.useEffect(() => {
    const isMobile = window.matchMedia('(max-width: 900px)').matches;
    if (isMobile) return;
    const onMove = (e) => {
      mouse.current = { x: e.clientX, y: e.clientY };
      if (dotRef.current) {
        dotRef.current.style.left = e.clientX + 'px';
        dotRef.current.style.top = e.clientY + 'px';
      }
    };
    const onOver = (e) => {
      if (e.target.closest('a, button, input, textarea, select') && glowRef.current) glowRef.current.classList.add('hovering');
    };
    const onOut = (e) => {
      if (e.target.closest('a, button, input, textarea, select') && glowRef.current) glowRef.current.classList.remove('hovering');
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseover', onOver);
    document.addEventListener('mouseout', onOut);
    let frame;
    const animate = () => {
      const gp = glowPos.current;
      gp.x += (mouse.current.x - gp.x) * 0.12;
      gp.y += (mouse.current.y - gp.y) * 0.12;
      if (glowRef.current) {
        glowRef.current.style.left = gp.x + 'px';
        glowRef.current.style.top = gp.y + 'px';
      }
      frame = requestAnimationFrame(animate);
    };
    frame = requestAnimationFrame(animate);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseover', onOver);
      document.removeEventListener('mouseout', onOut);
      cancelAnimationFrame(frame);
    };
  }, []);

  return (
    <>
      <div className="cursor-glow" ref={glowRef} />
      <div className="cursor-dot" ref={dotRef} />
    </>
  );
}

function ArrowRight({ size = 14 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none" style={{ display: 'inline-block', verticalAlign: 'middle' }}>
      <path d="M2 7H12M12 7L7.5 2.5M12 7L7.5 11.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// Smooth transition to main site
function navigateToMain(hash) {
  const overlay = document.getElementById('pageTransition');
  overlay.classList.add('active');
  setTimeout(() => {
    window.location.href = './' + (hash ? '#' + hash : '');
  }, 400);
}

function Header() {
  return (
    <header className="header">
      <div className="container header-inner">
        <a href="./" className="logo" onClick={(e) => { e.preventDefault(); navigateToMain(''); }}>
          <span className="mark"></span>
          SPACIOM
        </a>
        <a href="./" className="btn-ghost" onClick={(e) => { e.preventDefault(); navigateToMain(''); }}
           style={{ fontSize: 13, padding: '10px 20px' }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ display: 'inline-block', verticalAlign: 'middle' }}>
            <path d="M12 7H2M2 7L6.5 2.5M2 7L6.5 11.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          Back to home
        </a>
      </div>
    </header>
  );
}

function ContactForm() {
  const [submitted, setSubmitted] = React.useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
  };

  return (
    <div className="contact-main">
      <div className="reveal"><div className="contact-eyebrow">GET IN TOUCH</div></div>
      <div className="reveal reveal-delay-1"><h1 className="contact-title">Let's build the <span className="italic">experience.</span></h1></div>
      <div className="reveal reveal-delay-2"><p className="contact-desc">For partners, franchises, and the people ready to own the next era of fandom. Tell us about your team and what you're looking for.</p></div>

      {!submitted ? (
        <form onSubmit={handleSubmit}>
          <div className="reveal reveal-delay-3">
            <div className="form-row">
              <div className="form-group">
                <label className="form-label" htmlFor="firstName">First Name</label>
                <input className="form-input" type="text" id="firstName" placeholder="Jane" required />
              </div>
              <div className="form-group">
                <label className="form-label" htmlFor="lastName">Last Name</label>
                <input className="form-input" type="text" id="lastName" placeholder="Doe" required />
              </div>
            </div>
          </div>

          <div className="reveal reveal-delay-4">
            <div className="form-group">
              <label className="form-label" htmlFor="email">Email</label>
              <input className="form-input" type="email" id="email" placeholder="jane@franchise.com" required />
            </div>

            <div className="form-group">
              <label className="form-label" htmlFor="org">Organization</label>
              <input className="form-input" type="text" id="org" placeholder="Team or company name" />
            </div>

            <div className="form-group">
              <label className="form-label" htmlFor="interest">I'm interested in</label>
              <select className="form-select" id="interest">
                <option value="" disabled selected>Select an option</option>
                <option value="franchise">Franchise Partnership</option>
                <option value="brand">Brand Integration</option>
                <option value="investment">Investment Opportunity</option>
                <option value="media">Press / Media</option>
                <option value="other">Something Else</option>
              </select>
            </div>

            <div className="form-group">
              <label className="form-label" htmlFor="message">Message</label>
              <textarea className="form-textarea" id="message" placeholder="Tell us what you're thinking..."></textarea>
            </div>

            <button type="submit" className="form-submit">
              Send message
              <ArrowRight />
            </button>
          </div>
        </form>
      ) : (
        <div className="form-success visible">
          Thanks for reaching out. We'll be in touch soon — usually within 48 hours.
        </div>
      )}
    </div>
  );
}

function Footer() {
  const handleNavClick = (e, section) => {
    e.preventDefault();
    navigateToMain(section);
  };

  return (
    <footer className="footer">
      <div className="container">
        <div className="footer-grid">
          <div>
            <div className="brand-big">Spaciom.</div>
            <div className="brand-tag">The Spatial Fandom Experience ✦</div>
          </div>
          <div>
            <h4>Get In Touch</h4>
            <ul>
              <li><a href="mailto:info@spaciom.io">info@spaciom.io</a></li>
              <li>Winston-Salem, NC</li>
            </ul>
          </div>
          <div>
            <h4>Company</h4>
            <ul>
              <li><a href="#">Owner Website</a></li>
              <li>Spaciom Inc.</li>
              <li style={{ color: 'var(--ink-faint)', fontFamily: 'Geist Mono, monospace', fontSize: 11, letterSpacing: '0.1em' }}>v1.0</li>
            </ul>
          </div>
          <div>
            <h4>Sections</h4>
            <ul>
              <li><a href="./#vision" onClick={(e) => handleNavClick(e, 'vision')}>Vision</a></li>
              <li><a href="./#product" onClick={(e) => handleNavClick(e, 'product')}>Product</a></li>
              <li><a href="./#moments" onClick={(e) => handleNavClick(e, 'moments')}>Moments</a></li>
              <li><a href="./#team" onClick={(e) => handleNavClick(e, 'team')}>Team</a></li>
            </ul>
          </div>
        </div>
        <div className="footer-bottom">
          <span>© 2021 — 2026 SPACIOM INC. ALL RIGHTS RESERVED.</span>
          <span>SPATIAL FANDOM EXPERIENCE</span>
        </div>
      </div>
    </footer>
  );
}

function App() {
  // Lenis smooth scroll
  React.useEffect(() => {
    if (typeof Lenis === 'undefined') return;
    const lenis = new Lenis({
      duration: 1.4,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      smoothWheel: true,
      wheelMultiplier: 1.0,
      touchMultiplier: 1.4,
    });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);
    return () => lenis.destroy();
  }, []);

  // Scroll reveal
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal, .reveal-scale');
    if (!els.length) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  return (
    <>
      <CustomCursor />
      <Header />
      <main style={{ position: 'relative', zIndex: 1 }}>
        <ContactForm />
      </main>
      <Footer />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
